<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poe 模型费率对比可视化</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
        <header>
            <h1>🚀 Poe 模型费率可视化对比</h1>
            <p class="subtitle">基于 FastAPI + Chart.js 的 AI 模型价格监控面板</p>
            <div class="actions">
                <div class="action-buttons">
                    <button id="updateBtn" class="btn-primary">🔄 立即更新数据</button>
                    <button id="importLeaderboardBtn" class="btn-secondary action-btn">导入排行榜</button>
                </div>
                <span id="loadingMsg" class="hidden">正在抓取最新数据，请稍候...</span>
                <div id="progressWrap" class="progress-wrap hidden" aria-live="polite">
                    <div class="progress-track">
                        <div id="updateProgressBar" class="progress-bar" style="width: 0%;"></div>
                    </div>
                    <div id="progressText" class="progress-text">0%</div>
                </div>
            </div>
        </header>

        <section class="config-section">
            <div class="card">
                <div class="card-header">🛠️ 管理待爬取模型</div>
                <div class="model-form">
                    <input type="text" id="newModelInput" placeholder="输入模型 Handle (如: Claude-3-Opus)">
                    <button id="addModelBtn" class="btn-secondary">添加</button>
                </div>
                <div class="model-hint">提示：禁用仅保存在当前浏览器，不会同步到配置文件</div>
                <div id="modelList" class="model-tags"></div>
            </div>
        </section>

        <section class="visuals">
            <div class="chart-card">
                <div class="chart-header chart-header-row">
                    <span>模型价格分布 (USD / 1M Tokens)</span>
                    <div class="chart-controls">
                        <label for="chartSortKey">排序</label>
                        <select id="chartSortKey">
                            <option value="none">默认</option>
                            <option value="input_usd">按输入费率</option>
                            <option value="output_usd">按输出费率</option>
                            <option value="handle">按模型名称</option>
                        </select>
                        <button id="chartSortDirBtn" class="btn-sort-dir" type="button">降序</button>
                    </div>
                </div>
                <div class="chart-model-legend-wrap">
                    <div class="chart-model-legend-title">Models（点击隐藏/显示）</div>
                    <div id="chartModelLegend" class="chart-model-legend"></div>
                </div>
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>
        </section>

        <section class="table-section">
            <div class="table-controls">
                <input type="text" id="filterInput" placeholder="🔍 搜索模型名称...">
                <div class="table-side-controls">
                    <label class="group-sort-toggle">
                        <input type="checkbox" id="groupByPrefixToggle">
                        <span>按模型前缀分组排序</span>
                    </label>
                    <div class="table-info">点击表头可进行数值排序</div>
                </div>
            </div>
            <table id="rateTable">
                <thead>
                    <tr>
                        <th data-sort="handle">模型名称</th>
                        <th data-sort="input_usd">输入费率 (USD/1M)</th>
                        <th data-sort="output_usd">输出费率 (USD/1M)</th>
                        <th>缓存折扣</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </section>
    </div>

    <dialog id="leaderboardDialog" class="leaderboard-dialog">
        <form method="dialog" id="leaderboardForm" class="leaderboard-form">
            <div class="dialog-title">导入排行榜</div>
            <label for="leaderboardCountInput" class="dialog-label">导入 Top N 个模型</label>
            <input
                id="leaderboardCountInput"
                class="dialog-input"
                type="number"
                min="1"
                max="100"
                value="30"
                inputmode="numeric"
            >
            <div class="dialog-hint">默认 30，最大 100</div>
            <div class="dialog-actions">
                <button type="button" id="cancelLeaderboardBtn" class="btn-ghost">取消</button>
                <button type="submit" id="confirmLeaderboardBtn" class="btn-primary">开始导入</button>
            </div>
        </form>
    </dialog>
    <script src="js/app.js"></script>
</body>
</html>
